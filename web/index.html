<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blab — Language exchange chat</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #efebe2;
        --ink: #1f3340;
        --brand: #d4694a;
        --muted: #6d6961;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100%;
      }
      main {
        max-width: 480px;
        margin: 0 auto;
        padding: 64px 24px;
        text-align: center;
      }
      h1 {
        font-size: 40px;
        margin: 0 0 12px;
        color: var(--brand);
        letter-spacing: -1px;
      }
      p {
        font-size: 17px;
        line-height: 1.5;
        color: var(--muted);
        margin: 0 0 32px;
      }
      a.cta {
        display: inline-block;
        background: var(--brand);
        color: white;
        padding: 14px 28px;
        border-radius: 14px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>blab</h1>
      <p>A messenger for language exchange. Chat with a partner, learn each other’s language.</p>
      <a class="cta" href="https://play.google.com/store/apps/details?id=sh.aswin.blab">Get the app</a>
    </main>
  </body>
</html>
